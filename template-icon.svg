<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#16213E"/><stop offset="100%" stop-color="#0A0F1C"/></linearGradient>
    <linearGradient id="monitor" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9944EE"/><stop offset="100%" stop-color="#6C3FC5"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B366FF"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <circle cx="400" cy="400" r="200" stroke="#9944EE" stroke-width="1.5" opacity="0.1"/>
  <!-- Server / monitor icon -->
  <g transform="translate(400,400)">
    <!-- Screen -->
    <rect x="-150" y="-140" width="300" height="200" rx="16" fill="url(#screen)" opacity="0.8"/>
    <!-- Screen inner glow -->
    <rect x="-130" y="-120" width="260" height="155" rx="8" fill="url(#monitor)" opacity="0.3"/>
    <!-- Screen content lines -->
    <line x1="-110" y1="-90" x2="80" y2="-90" stroke="#DDD6FE" stroke-width="3" opacity="0.2"/>
    <line x1="-110" y1="-70" x2="50" y2="-70" stroke="#DDD6FE" stroke-width="3" opacity="0.15"/>
    <line x1="-110" y1="-50" x2="100" y2="-50" stroke="#DDD6FE" stroke-width="3" opacity="0.25"/>
    <!-- CPU/graph visual -->
    <rect x="-110" y="-30" rx="2" width="12" height="20" fill="#DDD6FE" opacity="0.25"/>
    <rect x="-92" y="-40" rx="2" width="12" height="30" fill="#DDD6FE" opacity="0.2"/>
    <rect x="-74" y="-20" rx="2" width="12" height="10" fill="#DDD6FE" opacity="0.3"/>
    <rect x="-56" y="-35" rx="2" width="12" height="25" fill="#DDD6FE" opacity="0.22"/>
    <!-- Stand -->
    <rect x="-40" y="60" width="80" height="12" rx="6" fill="url(#monitor)" opacity="0.5"/>
    <rect x="-20" y="72" width="40" height="20" rx="4" fill="url(#monitor)" opacity="0.35"/>
  </g>
</svg>