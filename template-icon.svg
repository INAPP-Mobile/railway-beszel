<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9944EE"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Large monitor/server -->
  <g transform="translate(400,390)">
    <rect x="-180" y="-170" width="360" height="240" rx="24" fill="#FFFFFF"/>
    <!-- Screen content -->
    <rect x="-150" y="-140" width="300" height="170" rx="12" fill="#9944EE" opacity="0.15"/>
    <line x1="-130" y1="-100" x2="100" y2="-100" stroke="#6C3FC5" stroke-width="5"/>
    <line x1="-130" y1="-70" x2="60" y2="-70" stroke="#6C3FC5" stroke-width="5"/>
    <line x1="-130" y1="-40" x2="120" y2="-40" stroke="#6C3FC5" stroke-width="5"/>
    <!-- CPU bars -->
    <rect x="-130" y="-10" rx="4" width="16" height="30" fill="#9944EE"/>
    <rect x="-106" y="-25" rx="4" width="16" height="45" fill="#9944EE"/>
    <rect x="-82" y="-5" rx="4" width="16" height="25" fill="#9944EE"/>
    <rect x="-58" y="-20" rx="4" width="16" height="40" fill="#9944EE"/>
    <!-- Stand -->
    <rect x="-50" y="70" width="100" height="16" rx="8" fill="#FFFFFF"/>
    <rect x="-25" y="86" width="50" height="24" rx="6" fill="#FFFFFF"/>
  </g>
</svg>