<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)" rx="40"/>
  <!-- Server/monitor icon -->
  <g transform="translate(400,400)">
    <!-- Base/server rack -->
    <rect x="-120" y="-60" width="240" height="120" rx="12" fill="none" stroke="#9944ee" stroke-width="6"/>
    <!-- Monitor screen -->
    <rect x="-90" y="-90" width="180" height="30" rx="6" fill="#9944ee" opacity="0.3"/>
    <rect x="-90" y="-90" width="180" height="30" rx="6" fill="none" stroke="#9944ee" stroke-width="4"/>
    <!-- Metric bars -->
    <rect x="-80" y="-45" width="40" height="20" rx="4" fill="#9944ee" opacity="0.7"/>
    <rect x="-20" y="-55" width="30" height="30" rx="4" fill="#b366ff" opacity="0.9"/>
    <rect x="25" y="-35" width="55" height="10" rx="4" fill="#9944ee" opacity="0.5"/>
    <!-- More bars -->
    <rect x="-80" y="-10" width="25" height="15" rx="4" fill="#9944ee" opacity="0.4"/>
    <rect x="-40" y="-20" width="60" height="25" rx="4" fill="#b366ff" opacity="0.8"/>
    <rect x="35" y="-15" width="45" height="20" rx="4" fill="#9944ee" opacity="0.6"/>
    <!-- Bottom bars -->
    <rect x="-80" y="20" width="50" height="15" rx="4" fill="#9944ee" opacity="0.5"/>
    <rect x="-15" y="10" width="35" height="25" rx="4" fill="#b366ff" opacity="0.7"/>
    <rect x="35" y="15" width="45" height="20" rx="4" fill="#9944ee" opacity="0.4"/>
    <!-- Pulse line -->
    <polyline points="-90,65 -55,65 -40,35 -25,65 -10,45 5,65 20,35 35,65 70,65 90,65"
              fill="none" stroke="#9944ee" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
</svg>
