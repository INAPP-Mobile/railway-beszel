<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Server/monitor icon -->
  <g transform="translate(160,315)">
    <!-- Base -->
    <rect x="-60" y="-35" width="120" height="70" rx="8" fill="none" stroke="#9944ee" stroke-width="4"/>
    <!-- Screen -->
    <rect x="-50" y="-55" width="100" height="18" rx="4" fill="#9944ee" opacity="0.3"/>
    <rect x="-50" y="-55" width="100" height="18" rx="4" fill="none" stroke="#9944ee" stroke-width="3"/>
    <!-- Bars -->
    <rect x="-40" y="-25" width="25" height="12" rx="3" fill="#b366ff" opacity="0.8"/>
    <rect x="-5" y="-32" width="18" height="19" rx="3" fill="#9944ee" opacity="0.6"/>
    <rect x="20" y="-18" width="20" height="8" rx="3" fill="#b366ff" opacity="0.7"/>
    <rect x="-40" y="-2" width="15" height="8" rx="3" fill="#9944ee" opacity="0.5"/>
    <rect x="-15" y="-10" width="35" height="14" rx="3" fill="#b366ff" opacity="0.8"/>
    <rect x="-40" y="15" width="30" height="10" rx="3" fill="#b366ff" opacity="0.6"/>
    <rect x="2" y="8" width="25" height="15" rx="3" fill="#9944ee" opacity="0.7"/>
    <!-- Pulse line -->
    <polyline points="-50,42 -30,42 -20,30 -10,42 0,35 10,42 20,30 30,42 50,42"
              fill="none" stroke="#9944ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="420" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="1">Beszel</text>
  <text x="420" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#b366ff" letter-spacing="0.5">Lightweight Server Monitoring</text>
  <!-- Railway deploy badge -->
  <g transform="translate(420,380)">
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#6C3FC5"/>
    <text x="110" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Deploy on Railway</text>
  </g>
</svg>
